# Extend Nixpacks default Python venv install — never replace with bare `pip` (breaks PATH).
[phases.install]
cmds = [
  "...",
  "/opt/venv/bin/python -m pip install --no-cache-dir 'setuptools>=69.0.0' razorpay==1.3.0",
  "/opt/venv/bin/python -c \"import pkg_resources, razorpay; print('razorpay ok')\"",
]

[start]
cmd = "/opt/venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT"
