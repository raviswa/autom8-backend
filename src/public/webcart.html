<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Munafe Cart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --header: #14532d;      /* deep green ribbon, like Geetham */
      --header-ink: #ffffff;
      --brand: #DB5619;       /* Munafe orange — CTAs, chips, prices */
      --brand-ink: #ffffff;
      --bg: #fff9ef;          /* cream body */
      --panel: #ffffff;
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #f1d9bf;
      --ok: #166534;
      --danger: #b91c1c;
      --radius: 14px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Poppins", "Segoe UI", system-ui, sans-serif;
      color: var(--ink);
      background: var(--bg);
      padding-bottom: 64px; /* room for bottom nav */
    }
    img { -webkit-user-drag: none; }
    button { font-family: inherit; }

    /* ---------- Header ribbon ---------- */
    .header {
      background: linear-gradient(135deg, var(--header), #0f3d22);
      color: var(--header-ink);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 30;
    }
    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .logo {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      background: #fff;
      border: 2px solid rgba(255,255,255,0.6);
      flex-shrink: 0;
    }
    .logo-fallback {
      width: 42px; height: 42px; border-radius: 50%;
      background: #fff; color: var(--header);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; flex-shrink: 0;
    }
    .brand-text { min-width: 0; }
    #brandName { font-weight: 700; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: .01em; }
    #sessionMeta { color: rgba(255,255,255,0.8); font-size: 11px; }
    .slot-pill {
      border-radius: 999px;
      padding: 6px 12px;
      font-weight: 600;
      font-size: 12px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .slot-pill.open { background: #22c55e; border-color: #22c55e; color: #06280f; }

    .shell { max-width: 1080px; margin: 0 auto; padding: 12px 14px 0; }

    .search-wrap { position: relative; margin-bottom: 10px; }
    .search-wrap input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 11px 14px 11px 38px;
      font: inherit;
      background: var(--panel);
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }
    .search-wrap svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); opacity: .5; }

    #status { margin-bottom: 10px; padding: 10px 12px; border-radius: 10px; display: none; }
    #status.ok { display: block; background: #dcfce7; color: var(--ok); }
    #status.err { display: block; background: #fee2e2; color: var(--danger); }
    .banner {
      margin-bottom: 10px; padding: 10px 12px; border-radius: 10px;
      border: 1px solid #f59e0b; background: #fffbeb; color: #92400e; font-size: 13px;
    }

    /* FIX (2): give menu column min-width:0 so it never gets pushed/overlapped
       by the sticky cart column on desktop grids */
    .layout { display: grid; grid-template-columns: 1fr; gap: 14px; }
    .menu { min-width: 0; }

    .hscroll { display: flex; gap: 10px; overflow-x: auto; padding: 2px 2px 10px; scrollbar-width: none; }
    .hscroll::-webkit-scrollbar { display: none; }
    .hcard {
      flex: 0 0 150px; background: var(--panel); border: 1px solid var(--line);
      border-radius: var(--radius); overflow: hidden; cursor: pointer;
    }
    .hcard img { width: 100%; height: 90px; object-fit: cover; background: #f3f4f6; display: block; }
    .hcard .hc-body { padding: 8px; }
    .hcard .hc-name { font-size: 12.5px; font-weight: 600; line-height: 1.25; }
    .hcard .hc-price { color: var(--brand); font-weight: 700; font-size: 12.5px; margin-top: 4px; }

    .section-title { font-weight: 700; font-size: 14px; margin: 4px 0 8px; display: flex; align-items: center; gap: 6px; }

    .chips { display: flex; gap: 8px; overflow-x: auto; padding: 2px 2px 12px; scrollbar-width: none; }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 14px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      font-weight: 600;
      font-size: 12.5px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .chip.active { background: var(--brand); border-color: var(--brand); color: var(--brand-ink); }

    /* FIX (2): denser rows + 2-col grid on tablet/wide-mobile widths so the
       large blank space next to short single-line item names goes away */
    .menu-list { display: flex; flex-direction: column; gap: 8px; padding-bottom: 8px; }
    @media (min-width: 520px) and (max-width: 900px) {
      .menu-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    }
    .row-card {
      display: flex; gap: 10px; align-items: center;
      background: var(--panel); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 9px;
      min-height: 0;
    }
    .row-card img { width: 56px; height: 56px; border-radius: 10px; object-fit: cover; background: #f3f4f6; flex-shrink: 0; }
    .row-card .img-fallback {
      width: 56px; height: 56px; border-radius: 10px; background: #f3f4f6; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 10px;
    }
    .row-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; gap: 1px; }
    .row-cat { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .03em; }
    .row-name { font-weight: 600; font-size: 13.5px; line-height: 1.25; }
    .row-price { color: var(--brand); font-weight: 700; font-size: 13px; margin-top: 1px; }
    .note {
      display: inline-block; margin-top: 4px; font-size: 10.5px; color: #92400e;
      background: #ffedd5; border: 1px solid #fed7aa; padding: 2px 7px; border-radius: 999px;
    }
    .add-zone { flex-shrink: 0; }
    /* CHANGE (1): +/- buttons shrunk to ~72% of original size */
    .btn-add {
      border: none; background: var(--brand); color: #fff; border-radius: 8px;
      width: 26px; height: 26px; font-size: 14px; font-weight: 700; cursor: pointer; line-height: 1;
    }
    .stepper {
      display: flex; align-items: center; gap: 0; border: 1px solid var(--brand); border-radius: 8px; overflow: hidden;
    }
    .stepper button {
      border: none; background: var(--brand); color: #fff; width: 22px; height: 26px;
      font-size: 12px; font-weight: 700; cursor: pointer;
    }
    .stepper span { width: 18px; text-align: center; font-weight: 700; font-size: 11px; }
    .empty-state { text-align: center; color: var(--muted); padding: 40px 10px; font-size: 13.5px; grid-column: 1 / -1; }

    /* ---------- Cart panel: bottom sheet on mobile, static aside on desktop ---------- */
    .cart-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      z-index: 40; display: none;
    }
    .cart-overlay.open { display: block; }
    .cart-panel {
      position: fixed; left: 0; right: 0; bottom: 0;
      max-height: 86vh;
      background: var(--panel);
      border-radius: 18px 18px 0 0;
      z-index: 50;
      transform: translateY(100%);
      transition: transform .25s ease;
      display: flex; flex-direction: column;
      box-shadow: 0 -8px 24px rgba(0,0,0,0.15);
    }
    .cart-panel.open { transform: translateY(0); }
    .cart-head {
      padding: 14px 16px; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .cart-head strong { font-size: 16px; font-weight: 700; }
    .icon-btn { border: none; background: #f3f4f6; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; }
    .cart-body { padding: 12px 16px; overflow-y: auto; display: grid; gap: 10px; }
    .cart-line { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .cart-line .cl-name { font-size: 13.5px; font-weight: 600; }
    .cart-line .cl-price { color: var(--muted); font-size: 11.5px; }
    .cart-line .cl-total { font-weight: 700; font-size: 13.5px; min-width: 56px; text-align: right; }
    .totals { border-top: 1px dashed var(--line); padding-top: 10px; display: grid; gap: 6px; }
    .line { display: flex; justify-content: space-between; gap: 10px; align-items: center; font-size: 13.5px; }
    .line.grand { font-size: 16px; font-weight: 700; }
    textarea, input.field {
      width: 100%; border: 1px solid var(--line); border-radius: 10px;
      padding: 10px; font: inherit; background: #fff;
    }
    .cart-foot { padding: 12px 16px 16px; border-top: 1px solid var(--line); flex-shrink: 0; }
    .btn-submit {
      width: 100%; border: none; background: var(--header); color: #fff;
      border-radius: 12px; padding: 13px; font-weight: 700; font-size: 14.5px; cursor: pointer;
    }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; }
    .wa-fallback { display: none; margin-top: 10px; text-align: center; }
    .wa-fallback a { color: var(--ok); font-weight: 600; font-size: 13px; }

    /* Floating "View Cart" bar */
    .float-bar {
      position: fixed; left: 14px; right: 14px; bottom: 70px; z-index: 35;
      background: var(--header); color: #fff; border-radius: 14px;
      padding: 12px 16px; display: none; align-items: center; justify-content: space-between;
      box-shadow: 0 6px 16px rgba(0,0,0,0.2); cursor: pointer;
    }
    .float-bar.show { display: flex; }
    .float-bar .fb-count { font-size: 12px; opacity: .85; }
    .float-bar .fb-total { font-weight: 700; font-size: 14.5px; }
    .float-bar .fb-cta { font-weight: 700; font-size: 13px; display: flex; align-items: center; gap: 4px; }

    /* Bottom navigation */
    .bottom-nav {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 36;
      background: var(--panel); border-top: 1px solid var(--line);
      display: flex; padding: 6px 6px calc(6px + env(safe-area-inset-bottom));
    }
    .nav-item {
      flex: 1; border: none; background: none; display: flex; flex-direction: column;
      align-items: center; gap: 2px; padding: 6px 4px; cursor: pointer; color: var(--muted); font-size: 10.5px; font-weight: 600;
      position: relative;
    }
    .nav-item.active { color: var(--brand); }
    .nav-badge {
      position: absolute; top: 0; right: 18%; background: var(--brand); color: #fff;
      border-radius: 999px; font-size: 9px; min-width: 15px; height: 15px; display: flex;
      align-items: center; justify-content: center; padding: 0 3px; font-weight: 700;
    }

    /* ---------- Desktop: persistent side cart, no overlay ----------
       FIX (3): explicit !important overrides so the mobile fixed/transform
       rules can never leak through on resize/zoom and overlap the menu. */
    @media (min-width: 901px) {
      body { padding-bottom: 0; }
      .shell { padding-top: 16px; }
      .layout { grid-template-columns: 1fr 360px; align-items: start; }
      .bottom-nav { display: none; }
      .float-bar { display: none !important; }
      .cart-overlay { display: none !important; }
      .cart-panel {
        position: sticky !important;
        top: 86px;
        transform: none !important;
        max-height: calc(100vh - 110px);
        border-radius: var(--radius); border: 1px solid var(--line); box-shadow: none;
        z-index: 1;
      }
      .header { position: sticky; top: 0; border-radius: 0; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="brand">
      <img id="brandLogo" class="logo" alt="logo" style="display:none" />
      <div id="brandLogoFallback" class="logo-fallback">M</div>
      <div class="brand-text">
        <div id="brandName">Munafe</div>
        <div id="sessionMeta"></div>
      </div>
    </div>
    <div id="slotPill" class="slot-pill">—</div>
  </div>

  <div class="shell">
    <div id="status"></div>
    <div id="slotBanner" class="banner" style="display:none"></div>

    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="searchBox" placeholder="Search dishes, categories…" />
    </div>

    <div class="layout">
      <section class="menu" id="menuCol">
        <div id="specialWrap" style="display:none">
          <div class="section-title">⭐ Today's Special</div>
          <div id="specialGrid" class="hscroll"></div>
        </div>
        <div id="availableNowWrap" style="display:none">
          <div class="section-title">🍽️ Available Now</div>
          <div id="availableNowGrid" class="hscroll"></div>
        </div>

        <div id="tabChips" class="chips"></div>
        <div id="menuList" class="menu-list"></div>
      </section>

      <!-- Cart: bottom-sheet on mobile, sticky aside on desktop -->
      <div id="cartOverlay" class="cart-overlay"></div>
      <aside id="cartPanel" class="cart-panel">
        <div class="cart-head">
          <strong>🛒 Your Cart</strong>
          <button class="icon-btn" id="closeCartBtn">✕</button>
        </div>
        <div class="cart-body">
          <div id="cartLines"></div>
            <div class="totals">
            <div class="line"><span>Subtotal</span><strong id="subtotal">Rs 0</strong></div>
            <div class="line"><span>Discount</span><strong id="discount">- Rs 0</strong></div>
            <div class="line" id="parcelRow" style="display:none"><span>Parcel/packaging</span><strong id="parcelAmt">Rs 0</strong></div>
            <div class="line" id="deliveryRow" style="display:none"><span>Delivery charge</span><strong id="deliveryAmt">Rs 0</strong></div>
            <div class="line" id="gstRow" style="display:none"><span id="gstLabel">GST (5%)</span><strong id="gstAmt">Rs 0</strong></div>
            <div class="line grand"><span>Total</span><strong id="grand">Rs 0</strong></div>
          </div>          
        <input class="field" id="promo" placeholder="Promo code (optional)" />
        <textarea id="notes" rows="2" placeholder="Special request (optional)"></textarea>
        </div>
        <div class="cart-foot">
          <button id="submitBtn" class="btn-submit">Continue to WhatsApp</button>
          <div id="waFallback" class="wa-fallback"></div>
        </div>
      </aside>
    </div>
  </div>

  <div class="float-bar" id="floatBar">
    <div>
      <div class="fb-count" id="fbCount">0 items</div>
      <div class="fb-total" id="fbTotal">Rs 0</div>
    </div>
    <div class="fb-cta">View Cart →</div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" id="navMenu">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      Menu
    </button>
    <button class="nav-item" id="navSearch">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      Search
    </button>
    <button class="nav-item" id="navCart">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
      Cart
      <span class="nav-badge" id="navCartBadge" style="display:none">0</span>
    </button>
    <button class="nav-item" id="navHelp">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      Help
    </button>
  </nav>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';
    const phone = params.get('phone') || '';
    const slug = params.get('slug') || '';

    const state = {
      menu: [],
      cart: new Map(),
      phone: phone || '',
      restaurant: null,
      session: null,
      categories: [],
      activeTab: 'all',
      searchQuery: '',
      todaysSpecial: [],
      availableNow: [],
    };

    const $ = (id) => document.getElementById(id);
    const statusBox = $('status');
    const menuList = $('menuList');
    const specialGrid = $('specialGrid');
    const availableNowGrid = $('availableNowGrid');
    const tabChips = $('tabChips');
    const cartLines = $('cartLines');
    const cartPanel = $('cartPanel');
    const cartOverlay = $('cartOverlay');
    const floatBar = $('floatBar');
    const isDesktop = () => window.innerWidth >= 901;

    function showStatus(text, type) {
      statusBox.className = type || '';
      statusBox.textContent = text;
    }
    function money(v) { return `Rs ${Math.max(0, Number(v || 0)).toFixed(0)}`; }

    // FIX (4): persist cart per-token in sessionStorage so the +/- stepper
    // state survives reloads, the WhatsApp redirect-and-back flow, etc.
    // Without this, state.cart resets to an empty Map on every page load
    // and every item appears to lose its "already added" stepper state.
    const cartStorageKey = () => `munafe_cart:${token}`;
    function saveCartLocal() {
      try {
        sessionStorage.setItem(cartStorageKey(), JSON.stringify([...state.cart.entries()]));
      } catch (_e) { /* storage unavailable — fail silently, cart still works in-memory */ }
    }
    function loadCartLocal() {
      try {
        const raw = sessionStorage.getItem(cartStorageKey());
        if (raw) state.cart = new Map(JSON.parse(raw));
      } catch (_e) { /* ignore corrupt/missing data */ }
    }
    function clearCartLocal() {
      try { sessionStorage.removeItem(cartStorageKey()); } catch (_e) {}
    }

    function openCart() {
      cartPanel.classList.add('open');
      if (!isDesktop()) cartOverlay.classList.add('open');
    }
    function closeCart() {
      if (isDesktop()) return; // always open on desktop
      cartPanel.classList.remove('open');
      cartOverlay.classList.remove('open');
    }
    $('closeCartBtn').addEventListener('click', closeCart);
    cartOverlay.addEventListener('click', closeCart);
    floatBar.addEventListener('click', openCart);
    $('navCart').addEventListener('click', openCart);
    $('navMenu').addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    $('navSearch').addEventListener('click', () => { $('searchBox').focus(); window.scrollTo({ top: 0, behavior: 'smooth' }); });
    $('navHelp').addEventListener('click', () => {
      const phoneNum = (state.restaurant && state.restaurant.support_phone) || '';
      const msg = encodeURIComponent(`Hi, I need help with my order at ${(state.restaurant && state.restaurant.name) || 'the restaurant'}.`);
      if (phoneNum) window.open(`https://wa.me/${phoneNum}?text=${msg}`, '_blank');
    });

    function currentDiscount(subtotal) {
      const code = ($('promo').value || '').trim().toUpperCase();
      if (code === 'MUNAFE10') return { code, amount: Math.round(subtotal * 0.1) };
      return { code: '', amount: 0 };
    }

function cartTotals() {
      const lines = [...state.cart.values()];
      const subtotal = lines.reduce((s, l) => s + l.qty * l.price, 0);
      const promo = currentDiscount(subtotal);
      const afterDiscount = Math.max(0, subtotal - promo.amount);
      const count = lines.reduce((s, l) => s + l.qty, 0);

      // Pricing config from session (populated in loadSession)
      const cfg = state.pricingConfig || {};
      const serviceType = (state.session && state.session.type) || 'takeaway';
      const parcelPerItem = parseFloat(cfg.parcel_charge_per_item || 0);
      const gstRate = parseFloat(cfg.gst_rate || 5);
      const deliveryDefault = parseFloat(cfg.delivery_charge_default || 40);

      // Parcel charge: qty × rate, only for takeaway / delivery
      let parcelCharge = 0;
      if (['takeaway', 'delivery'].includes(serviceType) && parcelPerItem > 0) {
        parcelCharge = Math.round(lines.reduce((s, l) => s + l.qty * parcelPerItem, 0) * 100) / 100;
      }

      // Delivery charge: only for delivery
      const deliveryCharge = serviceType === 'delivery' ? deliveryDefault : 0;

      const preGst = Math.round((afterDiscount + parcelCharge + deliveryCharge) * 100) / 100;
      const gstAmount = Math.round(preGst * gstRate / 100 * 100) / 100;
      const total = Math.round((preGst + gstAmount) * 100) / 100;

      return { lines, subtotal, promo, afterDiscount, parcelCharge, deliveryCharge,
               gstRate, gstAmount, total, count };
    }

    function renderCart() {
      saveCartLocal(); // FIX (4): keep storage in sync on every cart render

      const { lines, subtotal, promo, total, count } = cartTotals();

      cartLines.innerHTML = lines.length
        ? lines.map(l => `
          <div class="cart-line">
            <div>
              <div class="cl-name">${l.name}</div>
              <div class="cl-price">${money(l.price)} each</div>
            </div>
            <div class="stepper" style="border-color:var(--brand)">
              <button data-step="-1" data-id="${l.id}">−</button>
              <span>${l.qty}</span>
              <button data-step="1" data-id="${l.id}">+</button>
            </div>
          </div>`).join('')
        : '<div class="empty-state">Your cart is empty.<br>Add some delicious items to get started!</div>';

      cartLines.querySelectorAll('button[data-step]').forEach(btn => {
        btn.addEventListener('click', () => {
          changeQty(btn.dataset.id, Number(btn.dataset.step));
        });
      });

$('subtotal').textContent = money(subtotal);
      $('discount').textContent = `- ${money(promo.amount)}`;

      // Parcel row
      if (parcelCharge > 0) {
        $('parcelAmt').textContent = money(parcelCharge);
        $('parcelRow').style.display = '';
      } else {
        $('parcelRow').style.display = 'none';
      }

      // Delivery row
      if (deliveryCharge > 0) {
        $('deliveryAmt').textContent = money(deliveryCharge);
        $('deliveryRow').style.display = '';
      } else {
        $('deliveryRow').style.display = 'none';
      }

      // GST row — always show when cart has items
      if (count > 0) {
        $('gstLabel').textContent = `GST (${gstRate}%)`;
        $('gstAmt').textContent = money(gstAmount);
        $('gstRow').style.display = '';
      } else {
        $('gstRow').style.display = 'none';
      }

      $('grand').textContent = money(total);

      $('fbCount').textContent = `${count} item${count === 1 ? '' : 's'}`;
      $('fbTotal').textContent = money(total);
      floatBar.classList.toggle('show', count > 0 && !isDesktop());

      const badge = $('navCartBadge');
      if (count > 0) { badge.style.display = 'flex'; badge.textContent = count; }
      else badge.style.display = 'none';

      renderMenuList(); // refresh +/- buttons on rows in sync with cart
    }

    function changeQty(id, delta) {
      const item = state.menu.find(i => String(i.id) === String(id));
      const key = item ? (item.retailer_id || item.id) : id;
      const prev = state.cart.get(key);
      const nextQty = (prev ? prev.qty : 0) + delta;
      if (nextQty <= 0) {
        state.cart.delete(key);
      } else if (prev) {
        prev.qty = nextQty;
      } else if (item) {
        state.cart.set(key, { id: key, name: item.name, price: Number(item.price || 0), qty: nextQty });
      }
      renderCart();
    }

    function addToCart(item) { changeQty(item.id, 1); }

    function rowQty(item) {
      const key = item.retailer_id || item.id;
      const line = state.cart.get(key);
      return line ? line.qty : 0;
    }

    function hCardHtml(item) {
      return `
        <div class="hcard" data-id="${item.id}">
          ${item.image_url ? `<img src="${item.image_url}" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'img-fallback',style:'height:90px',textContent:'No image'}))" />` : `<div class="img-fallback" style="width:100%;height:90px;border-radius:0">No image</div>`}
          <div class="hc-body">
            <div class="hc-name">${item.name}</div>
            <div class="hc-price">${money(item.price)}</div>
            ${item.special_note ? `<span class="note">${item.special_note}</span>` : ''}
          </div>
        </div>`;
    }

    function rowCardHtml(item) {
      const qty = rowQty(item);
      const actions = qty > 0
        ? `<div class="stepper"><button data-step="-1" data-id="${item.id}">−</button><span>${qty}</span><button data-step="1" data-id="${item.id}">+</button></div>`
        : `<button class="btn-add" data-add="${item.id}">+</button>`;
      return `
        <div class="row-card">
          ${item.image_url ? `<img src="${item.image_url}" alt="" onerror="this.outerHTML='<div class=\\'img-fallback\\'>No image</div>'" />` : `<div class="img-fallback">No image</div>`}
          <div class="row-info">
            <div class="row-cat">${item.category || 'General'}</div>
            <div class="row-name">${item.name}</div>
            <div class="row-price">${money(item.price)}</div>
            ${item.special_note ? `<span class="note">${item.special_note}</span>` : ''}
          </div>
          <div class="add-zone">${actions}</div>
        </div>`;
    }

    function bindRowHandlers(root) {
      root.querySelectorAll('button[data-add]').forEach(btn => {
        btn.addEventListener('click', () => {
          const item = state.menu.find(i => String(i.id) === btn.dataset.add);
          if (item) addToCart(item);
        });
      });
      root.querySelectorAll('button[data-step]').forEach(btn => {
        btn.addEventListener('click', () => changeQty(btn.dataset.id, Number(btn.dataset.step)));
      });
      root.querySelectorAll('.hcard[data-id]').forEach(card => {
        card.addEventListener('click', () => {
          const item = state.menu.find(i => String(i.id) === card.dataset.id);
          if (item) addToCart(item);
        });
      });
    }

    function renderTopSections() {
      $('specialWrap').style.display = state.todaysSpecial.length ? 'block' : 'none';
      specialGrid.innerHTML = state.todaysSpecial.map(hCardHtml).join('');
      bindRowHandlers(specialGrid);

      $('availableNowWrap').style.display = state.availableNow.length ? 'block' : 'none';
      availableNowGrid.innerHTML = state.availableNow.map(hCardHtml).join('');
      bindRowHandlers(availableNowGrid);
    }

    function renderChips() {
      state.categories = [...new Set(state.menu.map(i => i.category || 'General'))].sort((a, b) => a.localeCompare(b));
      const tabs = ['all', ...state.categories];
      tabChips.innerHTML = tabs.map(tab => {
        const active = state.activeTab === tab;
        const label = tab === 'all' ? 'All Items' : tab;
        return `<button class="chip ${active ? 'active' : ''}" data-tab="${tab}">${label}</button>`;
      }).join('');
      tabChips.querySelectorAll('button[data-tab]').forEach(btn => {
        btn.addEventListener('click', () => { state.activeTab = btn.dataset.tab; renderMenuList(); });
      });
    }

    function renderMenuList() {
      const q = state.searchQuery.trim().toLowerCase();
      let visible = state.activeTab === 'all'
        ? state.menu
        : state.menu.filter(i => (i.category || 'General') === state.activeTab);
      if (q) {
        visible = state.menu.filter(i =>
          i.name.toLowerCase().includes(q) || (i.category || '').toLowerCase().includes(q)
        );
      }
      menuList.innerHTML = visible.length
        ? visible.map(rowCardHtml).join('')
        : '<div class="empty-state">No dishes match your search.</div>';
      bindRowHandlers(menuList);
    }

    $('searchBox').addEventListener('input', (e) => {
      state.searchQuery = e.target.value;
      renderMenuList();
    });

    async function loadSession() {
      if (!token) {
        showStatus('This cart link is incomplete. Please reopen from WhatsApp.', 'err');
        return;
      }
      try {
        const q = new URLSearchParams({ token });
        if (phone) q.set('phone', phone);
        if (slug) q.set('slug', slug);
        const res = await fetch(`/api/webcart/session?${q.toString()}`);
        const data = await res.json();

        if (!res.ok || !data.valid) {
          showStatus(data.message || 'Session expired. Please request a new link on WhatsApp.', 'err');
          return;
        }

        state.restaurant = data.restaurant;
        state.session = data.session;
        state.phone = (data.session && data.session.phone) ? data.session.phone : (phone || '');
        state.menu = data.menu_items || [];
        state.pricingConfig = data.pricing_config || {};
        state.todaysSpecial = data.todays_special || [];
        state.availableNow = data.available_now || [];
        state.activeTab = data.primary_category || 'all';

        // FIX (4): restore any cart saved before this page load (reload, or
        // returning from the WhatsApp redirect) so steppers show correctly.
        loadCartLocal();

        if (data.theme && data.theme.primary_color) {
          document.documentElement.style.setProperty('--brand', data.theme.primary_color);
        }
        if (data.theme && data.theme.accent_color) {
          document.documentElement.style.setProperty('--header', data.theme.accent_color);
        }

        $('brandName').textContent = data.restaurant.name || 'Munafe';
        $('sessionMeta').textContent = `Token ${data.session.token} • ${data.session.phone}`;

        // FIX (1): robust logo handling — show fallback immediately if no
        // logo_url, and fall back gracefully if the URL fails to load
        // (broken link, CORS-blocked host, etc.) instead of leaving a
        // broken-image icon or a permanently empty slot.
        const logo = $('brandLogo');
        const fallback = $('brandLogoFallback');
        const initial = (data.restaurant.name || 'M').trim().charAt(0).toUpperCase() || 'M';
        fallback.textContent = initial;
        if (data.restaurant.logo_url) {
          logo.onerror = () => {
            logo.style.display = 'none';
            fallback.style.display = 'flex';
          };
          logo.onload = () => {
            logo.style.display = 'block';
            fallback.style.display = 'none';
          };
          logo.src = data.restaurant.logo_url;
        } else {
          logo.style.display = 'none';
          fallback.style.display = 'flex';
        }

        const pill = $('slotPill');
        if (data.current_slot) {
          pill.textContent = `${data.current_slot[0].toUpperCase()}${data.current_slot.slice(1)} • Open`;
          pill.classList.add('open');
        } else {
          pill.textContent = data.slot_state === 'closed' ? 'Closed' : 'Browse menu';
          pill.classList.remove('open');
        }

        const banner = $('slotBanner');
        if (data.slot_banner) { banner.style.display = 'block'; banner.textContent = data.slot_banner; }
        else banner.style.display = 'none';

        renderTopSections();
        renderChips();
        renderMenuList();
        renderCart();

        if (isDesktop()) openCart();
      } catch (_e) {
        showStatus('Unable to load the cart session right now. Please try again.', 'err');
      }
    }

    async function submitOrder() {
      if (!state.cart.size) {
        showStatus('Add at least one item before submitting.', 'err');
        return;
      }
      const submitBtn = $('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting…';

      const body = {
        token,
        phone: state.phone,
        items: [...state.cart.values()],
        promo_code: ($('promo').value || '').trim() || null,
        special_request: ($('notes').value || '').trim() || null,
      };

      try {
        const q = new URLSearchParams();
        if (slug) q.set('slug', slug);
        const res = await fetch(`/api/webcart/submit?${q.toString()}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();

        if (!res.ok || !data.ok) {
          showStatus(data.message || data.error || 'Could not submit your order.', 'err');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Continue to WhatsApp';
          return;
        }

        showStatus(
          `Order placed! Ref: ${data.order_ref}. Check WhatsApp for the Confirm & Pay button to complete payment.`,
          'ok',
        );

        // FIX (4): clear the saved cart now that the order has been
        // submitted, so coming back to this link starts fresh instead of
        // re-showing the just-submitted items as still "in cart".
        clearCartLocal();
        state.cart = new Map();
        renderCart();

        submitBtn.textContent = 'Confirm & Pay Sent';
      } catch (_e) {
        showStatus('Order submission failed. Please try again.', 'err');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Continue to WhatsApp';
      }
    }

    $('submitBtn').addEventListener('click', submitOrder);
    $('promo').addEventListener('input', renderCart);
    window.addEventListener('resize', () => { if (isDesktop()) openCart(); });
    loadSession();
  </script>
</body>
</html>
